<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Envelope">
<meta name="theme-color" content="#0F2A2B">
<title>Envelope Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F2A2B;--surface:#17393B;--elevated:#1E4345;--border:#2E5A5C;--text:#EAF7F6;--muted:#7FB5B3;--teal:#FF6B35;--teal-text:#FF9A6B;--red:#FF8585;--amber:#E8C25A;--lime:#A8E63D;--action-text:#1A0D06;--fg:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;--r:12px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.brand{font-family:var(--fg);font-size:1.4rem;font-weight:800;letter-spacing:-.03em;color:var(--teal);}
.brand span{color:var(--text);}
.ver{font-size:.68rem;font-weight:600;color:var(--text);opacity:.6;margin-left:6px;letter-spacing:0;vertical-align:2px;font-family:var(--fb);}
.tabs{display:flex;gap:3px;background:var(--surface);border-radius:var(--rs);padding:3px;}
.tab{padding:6px 14px;border:none;border-radius:6px;background:transparent;color:var(--muted);font-family:var(--fb);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;}
.tab.active{background:var(--elevated);color:var(--text);}
.btn-icon{width:36px;height:36px;border:none;border-radius:var(--rs);background:var(--lime);color:var(--action-text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;}
.btn-icon:hover{opacity:.85;}
.hero{padding:24px 20px 16px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.week-label{font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.week-range{font-family:var(--fg);font-size:1.45rem;font-weight:700;letter-spacing:-.04em;line-height:1;}
.week-nav{display:flex;gap:5px;align-items:center;margin-top:10px;}
.week-nav button{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:.8rem;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.week-nav button:hover{color:var(--text);border-color:var(--teal);}
.week-nav button:disabled{opacity:.3;cursor:default;}
.now-badge{font-size:.72rem;padding:3px 9px;border-radius:20px;background:var(--teal);color:var(--action-text);font-weight:700;letter-spacing:.05em;}
.hero-stats{display:flex;gap:24px;align-items:flex-start;}
.hstat{text-align:right;}
.hstat-label{font-size:.68rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.hstat-val{font-family:var(--fg);font-size:1.35rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.04em;line-height:1;}
.hstat-hero{text-align:right;}
.hstat-hero-val{font-family:var(--fg);font-size:2.3rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.05em;line-height:1;}
.hstat-spent-line{margin-top:9px;font-size:.8rem;font-variant-numeric:tabular-nums;}
.hstat-spent-label{color:var(--muted);font-weight:500;}
.hstat-spent-val{font-family:var(--fg);font-weight:700;}
.pos{color:var(--teal-text);}.neg{color:var(--red);}.neu{color:var(--text);}
.pot-bar-wrap{margin:0 20px 20px;background:var(--elevated);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.pot-bar-row{display:flex;align-items:center;gap:14px;}
.pot-bar-label{font-family:var(--fg);font-size:.72rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);white-space:nowrap;}
.pot-bar-label.neg{color:var(--red);}
.pot-bar-outer{flex:1;position:relative;padding-top:18px;}
.pot-bar-pct{position:absolute;top:0;font-family:var(--fg);font-size:.85rem;font-weight:800;color:var(--teal-text);transform:translateX(-50%);white-space:nowrap;transition:left .4s ease;}
.pot-bar-pct.over{color:var(--red);}
.pot-bar{width:100%;height:4px;background:rgba(234,247,246,.14);border-radius:2px;overflow:hidden;}
.pot-bar-fill{height:100%;border-radius:2px;background:var(--teal);transition:width .4s ease,background .3s;}
.pot-bar-fill.over{background:var(--red);}
.init-banner{margin:0 20px 18px;background:var(--elevated);border:1px solid rgba(232,194,90,.4);border-radius:var(--rs);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.init-banner-text{font-size:.84rem;color:var(--amber);}
.btn-amber{padding:7px 14px;background:var(--amber);color:var(--action-text);border:none;border-radius:6px;font-family:var(--fg);font-size:.78rem;font-weight:700;cursor:pointer;flex-shrink:0;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:0 20px 20px;}
.cat-card{background:var(--elevated);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.cat-card.active{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal);}
.cat-fill{position:absolute;bottom:0;left:0;right:0;opacity:.19;transition:height .5s cubic-bezier(.4,0,.2,1),background .3s;pointer-events:none;}
.cat-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.cat-icon{font-size:1.1rem;}
.cat-name{font-family:var(--fg);font-size:.82rem;font-weight:600;letter-spacing:-.01em;color:var(--text);}
.cat-spent{font-family:var(--fg);font-size:1.2rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.04em;line-height:1;margin-bottom:3px;}
.cat-pct{font-size:.72rem;color:var(--muted);font-variant-numeric:tabular-nums;}
.cat-bar{height:3px;background:rgba(234,247,246,.14);border-radius:2px;overflow:hidden;margin-top:10px;}
.cat-bar-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.add-row{padding:0 20px 20px;display:flex;justify-content:flex-end;}
.btn-add{display:flex;align-items:center;gap:7px;padding:9px 18px;background:var(--teal);color:var(--action-text);border:none;border-radius:var(--rs);font-family:var(--fg);font-size:.88rem;font-weight:700;cursor:pointer;letter-spacing:-.01em;transition:opacity .15s;}
.txn-section{padding:0 20px 32px;}
.section-label{font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.txn-card{background:var(--elevated);border:1px solid var(--border);border-radius:var(--r);padding:4px 16px;}
.txn-group{margin-bottom:0;}
.txn-group:not(:last-child){border-bottom:1px solid var(--border);}
.txn-row{display:flex;align-items:center;gap:12px;padding:13px 0;transition:background .12s;cursor:default;}
.txn-row:hover{background:rgba(234,247,246,.04);}
.txn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.txn-main{flex:1;min-width:0;}
.txn-vendor{font-size:.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txn-meta{font-size:.72rem;color:var(--muted);margin-top:1px;}
.txn-split-badge{font-size:.62rem;padding:1px 5px;border-radius:8px;background:var(--elevated);color:var(--muted);margin-left:5px;vertical-align:middle;}
.txn-right{text-align:right;flex-shrink:0;}
.txn-amount{font-family:var(--fg);font-size:.92rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--red);}
.txn-date{font-size:.7rem;color:var(--muted);margin-top:1px;}
.txn-del{opacity:.55;width:30px;height:30px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
.txn-edit{opacity:.85;font-size:.74rem;color:var(--teal-text);font-weight:700;background:none;border:none;cursor:pointer;padding:2px 8px;flex-shrink:0;font-family:var(--fb);}
.txn-edit:hover{opacity:1;text-decoration:underline;}
.txn-row:hover .txn-del{opacity:1;}
.txn-del:hover{color:var(--red);background:rgba(255,133,133,.16);}
.split-line{padding:6px 14px 6px 33px;display:flex;align-items:center;gap:8px;}
.split-line .txn-dot{width:5px;height:5px;opacity:.7;}
.split-line .txn-cat-name{font-size:.78rem;color:var(--muted);flex:1;}
.split-line .txn-amount{font-size:.8rem;}
.empty-txn{text-align:center;color:var(--muted);font-size:.84rem;padding:20px 0;}
.history-view{padding:20px;}
.hw-card{background:var(--elevated);border:1px solid var(--border);border-radius:var(--r);padding:15px 18px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;justify-content:space-between;}
.hw-card:hover{border-color:var(--teal);}
.hw-range{font-family:var(--fg);font-size:.92rem;font-weight:600;margin-bottom:3px;}
.hw-sub{font-size:.75rem;color:var(--muted);}
.hw-stat-val{font-family:var(--fg);font-size:.98rem;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;}
.hw-stat-sub{font-size:.68rem;color:var(--muted);text-align:right;text-transform:uppercase;letter-spacing:.05em;}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-family:var(--fb);font-size:.84rem;cursor:pointer;padding:0;margin-bottom:18px;}
.settings-view{padding:20px;max-width:500px;}
.settings-section{margin-bottom:28px;}
.settings-title{font-family:var(--fg);font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:24px 20px 44px;width:100%;max-width:500px;transform:translateY(20px);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.overlay.open .modal{transform:translateY(0);}
.modal-title{font-family:var(--fg);font-size:1rem;font-weight:700;letter-spacing:-.03em;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:.7rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field input,.field select{width:100%;padding:10px 13px;background:var(--elevated);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:.92rem;outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none;}
.date-collapsed{font-family:var(--fb);font-size:.86rem;color:var(--muted);cursor:pointer;padding:2px 0;}
.date-collapsed .date-change{color:var(--teal-text);font-weight:700;}
.date-collapsed:hover .date-change{text-decoration:underline;}
.field input:focus,.field select:focus{border-color:var(--teal);}
.field input::placeholder{color:var(--muted);}
.frow{display:flex;gap:10px;}
.frow .field{flex:1;}
.btn-primary{width:100%;padding:12px;background:var(--teal);color:var(--action-text);border:none;border-radius:var(--rs);font-family:var(--fg);font-size:.92rem;font-weight:700;cursor:pointer;letter-spacing:-.01em;margin-top:4px;transition:opacity .15s;}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{opacity:.5;cursor:default;}
.rollover-toggle{flex:1;padding:10px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--elevated);color:var(--text);font-family:var(--fg);font-size:.84rem;font-weight:700;cursor:pointer;transition:all .15s;}
.rollover-toggle.active{background:var(--teal);color:var(--action-text);border-color:var(--teal);}
.split-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.split-row{display:flex;gap:8px;align-items:flex-end;}
.split-row .field{flex:1;margin-bottom:0;}
.split-row .field:last-child{flex:0 0 100px;}
.split-add{background:none;border:none;color:var(--teal-text);font-size:.8rem;font-family:var(--fb);cursor:pointer;padding:2px 0;letter-spacing:.02em;}
.split-remove{width:24px;height:24px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--muted);cursor:pointer;font-size:.8rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;align-self:flex-end;margin-bottom:1px;}
.split-remove:hover{color:var(--red);border-color:var(--red);}
.split-total-hint{font-size:.74rem;color:var(--muted);margin-bottom:10px;font-variant-numeric:tabular-nums;}
.vendor-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.vchip{padding:5px 12px;background:var(--elevated);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:var(--fb);font-size:.78rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.vchip:hover{border-color:var(--teal);color:var(--teal-text);}
.vendor-wrap{position:relative;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--elevated);border:1px solid var(--teal);border-radius:0 0 var(--rs) var(--rs);z-index:200;max-height:160px;overflow-y:auto;}
.autocomplete-item{padding:9px 13px;font-size:.88rem;cursor:pointer;transition:background .1s;}
.autocomplete-item:hover{background:var(--surface);}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:#20494B;border:1px solid var(--teal);box-shadow:0 8px 28px rgba(0,0,0,.45);border-radius:var(--rs);padding:9px 18px;font-size:.82rem;color:var(--text);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:2000;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.actionable{pointer-events:auto;display:flex;align-items:center;gap:14px;}
.toast-undo{color:var(--teal-text);font-weight:700;cursor:pointer;background:none;border:none;font-size:.82rem;padding:0;font-family:var(--fg);}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-icon{font-size:2.5rem;margin-bottom:14px;}
.login-title{font-family:var(--fg);font-size:1.5rem;font-weight:700;letter-spacing:-.04em;margin-bottom:6px;}
.login-sub{color:var(--muted);font-size:.86rem;margin-bottom:28px;}
.login-form{width:100%;max-width:340px;}
.login-err{color:var(--red);font-size:.8rem;margin-bottom:10px;min-height:18px;}
@media(min-width:640px){.cat-grid{grid-template-columns:repeat(4,1fr);}.hero{padding:28px 28px 18px;}.pot-bar-wrap,.add-row,.txn-section,.cat-grid,.init-banner{padding-left:28px;padding-right:28px;}.hstat-hero-val{font-size:2.9rem;}}
@media(max-width:400px){.cat-grid{grid-template-columns:1fr 1fr;}.hero-stats{gap:16px;}.hstat-val{font-size:1.1rem;}.hstat-hero-val{font-size:1.7rem;}.week-range{font-size:1.2rem;}}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="manifest" href="manifest.json">
</head>
<body>
<script>
const SUPABASE_URL  = 'https://nczdcfdllibcqxefhrwi.supabase.co';
const SUPABASE_ANON = 'sb_publishable_WhLJPvvEKb6hMhIY1x5h_Q_b8uXAaiE';
</script>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="overlay" id="txnOverlay">
  <div class="modal">
    <div class="modal-title"><span id="txnModalTitle">Log Spending</span><button class="modal-close" onclick="closeOverlay('txnOverlay')">✕</button></div>
    <div class="field"><label>Vendor / Retailer</label><div class="vendor-chips" id="vendorChips" style="display:none"></div><div class="vendor-wrap"><input type="text" id="txnVendor" placeholder="e.g. HEB, Whataburger" autocomplete="off" oninput="onVendorInput(this.value)" onblur="hideAC()"><div class="autocomplete-list" id="acList" style="display:none"></div></div></div>
    <div class="field"><label>Description (optional)</label><input type="text" id="txnDesc" placeholder="e.g. weekly groceries"></div>
    <div class="field"><label>Date</label><div class="date-collapsed" id="dateCollapsed" onclick="expandDate()"><span id="dateCollapsedText"></span> · <span class="date-change">change</span></div><input type="date" id="txnDate" style="display:none"></div>
    <div class="split-rows" id="splitRows"></div>
    <div class="split-total-hint" id="splitHint"></div>
    <button class="split-add" onclick="addSplitRow()">+ split across another category</button>
    <button class="btn-primary" id="txnSubmitBtn" onclick="submitTransaction()" style="margin-top:14px">Save</button>
  </div>
</div>
<div class="overlay" id="initOverlay">
  <div class="modal">
    <div class="modal-title"><span id="initTitle">Set Up This Week</span><button class="modal-close" onclick="closeOverlay('initOverlay')">✕</button></div>
    <div class="field"><label>Weekly Budget ($)</label><input type="number" id="initBudget" placeholder="600" step="1" min="1"></div>
    <div id="initRolloverBlock" style="display:none;margin-bottom:14px;">
      <div style="font-size:.82rem;color:var(--amber);font-weight:600;margin-bottom:8px;" id="initRolloverNote"></div>
      <div style="display:flex;gap:8px;">
        <button type="button" class="rollover-toggle" id="rolloverYesBtn" onclick="setRolloverChoice(true)"></button>
        <button type="button" class="rollover-toggle" id="rolloverNoBtn" onclick="setRolloverChoice(false)">Start fresh</button>
      </div>
    </div>
    <button class="btn-primary" onclick="submitInitWeek()">Start the Week</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js"></script>
<script>
let sb,session;
const APP_VERSION = '1.9';
const state={view:'dashboard',weekStart:null,weeks:[],categories:[],categoriesById:{},currentWeek:null,transactions:[],summary:null,catSpending:[],settings:{},historyDetailWeek:null,historyDetailTxns:[],historyDetailCats:[],historyDetailSummary:null,vendorMap:{},vendorNames:[]};
let catFilter=null;
const $=id=>document.getElementById(id);
const fmt=n=>n<0?'-$'+Math.abs(n).toFixed(2):'$'+Number(n).toFixed(2);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const toInitCap=s=>(s||'').replace(/['’‘ʼ＇]/g,'').toLowerCase().replace(/(^|[^a-z0-9])([a-z])/g,(_,p1,p2)=>p1+p2.toUpperCase());
function saturday(d=new Date()){const dt=new Date(d);dt.setHours(0,0,0,0);const dow=dt.getDay();dt.setDate(dt.getDate()-((dow+1)%7));return dt;}
function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtRange(start){const s=new Date(start+'T00:00:00');const e=new Date(s);e.setDate(e.getDate()+6);const mo=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});return mo(s)+' – '+mo(e);}
function fmtDateShort(dstr){return new Date(dstr+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function isCurrentWeek(startDate){return startDate===dateStr(saturday());}
function showToast(msg,undoFn){
  const t=$('toast');clearTimeout(t._hideTimer);
  if(typeof undoFn==='function'){
    t.classList.add('actionable');
    t.innerHTML='<span></span><button class="toast-undo">Undo</button>';
    t.querySelector('span').textContent=msg;
    t.querySelector('.toast-undo').onclick=()=>{undoFn();t.classList.remove('show');t.classList.remove('actionable');};
    t.classList.add('show');
    t._hideTimer=setTimeout(()=>{t.classList.remove('show');t.classList.remove('actionable');},5000);
  }else{
    t.classList.remove('actionable');
    t.textContent=msg;t.classList.add('show');
    t._hideTimer=setTimeout(()=>t.classList.remove('show'),2200);
  }
}
function openOverlay(id){$(id).classList.add('open');}
function closeOverlay(id){$(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});});
function initSB(){sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);return true;}
async function forceRefresh(){await loadMeta();await loadWeekData(dateStr(state.weekStart));if(state.view==='dashboard')renderDashboard();else if(state.view==='history')renderHistoryList();else if(state.view==='history-detail')await openHistoryDetail(state.historyDetailWeek);else if(state.view==='settings')renderSettings();}
async function boot(){
  initSB();
  $('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;"><div style="color:var(--muted);font-size:.9rem">Loading…</div></div>';
  const {data:{session:s}}=await sb.auth.getSession();
  session=s;
  if(!s){sb.auth.onAuthStateChange(async(_,ns)=>{if(ns){session=ns;state.weekStart=saturday();await loadMeta();render();}});renderLogin();return;}
  state.weekStart=saturday();await loadMeta();render();
}
async function loadMeta(){
  const {data:allCats}=await sb.from('categories').select('*').order('sort_order');
  state.categoriesById={};(allCats||[]).forEach(c=>{state.categoriesById[c.id]=c;});
  state.categories=(allCats||[]).filter(c=>c.is_active);
  const {data:ws}=await sb.from('weeks').select('*').order('start_date',{ascending:false});state.weeks=ws||[];
  const {data:sv}=await sb.from('settings').select('*');(sv||[]).forEach(r=>{state.settings[r.key]=r.value;});
  const {data:vm}=await sb.from('vendor_category_map').select('*');state.vendorMap={};state.vendorNames=[];
  (vm||[]).forEach(r=>{state.vendorMap[r.vendor_key]=r.category_id;state.vendorNames.push(r.vendor_key);});state.vendorNames.sort();
  await computeTopVendors();
}
function normVendorKey(v){return (v||'').replace(/[‘’ʼ＇]/g,"'").replace(/\s+/g,' ').trim().toLowerCase();}
async function computeTopVendors(){
  const {data:vtx}=await sb.from('transactions').select('vendor').not('vendor','is',null);
  const counts={};
  (vtx||[]).forEach(r=>{const k=normVendorKey(r.vendor);if(!k)return;counts[k]=(counts[k]||0)+1;});
  state.topVendors=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0,5);
}
async function loadWeekData(startDate){
  const cw=state.weeks.find(w=>w.start_date===startDate);state.currentWeek=cw||null;
  if(!cw){state.transactions=[];state.summary=null;state.catSpending=[];return;}
  const[{data:txns},{data:summ},{data:cats}]=await Promise.all([
    sb.from('transactions').select('*,categories(name,icon,color)').eq('week_id',cw.id).order('created_at',{ascending:false}),
    sb.from('week_summary').select('*').eq('id',cw.id).single(),
    sb.from('category_spending').select('*').eq('week_id',cw.id).order('sort_order'),
  ]);
  state.transactions=txns||[];state.summary=summ||null;state.catSpending=cats||[];
}
function renderLogin(){
  $('app').innerHTML=`<div class="login-screen"><div class="login-icon">📦</div><div class="login-title">Envelope<span style="color:var(--teal)">.</span></div><div class="login-sub">Sign in to your budget</div><div class="login-form"><div class="login-err" id="loginErr"></div><div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"></div><div class="field"><label>Password</label><input type="password" id="loginPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div><button class="btn-primary" onclick="doLogin()">Sign In</button></div></div>`;
}
async function doLogin(){
  const email=$('loginEmail').value.trim(),pw=$('loginPw').value;$('loginErr').textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){$('loginErr').textContent=error.message;return;}session=data.session;await loadMeta();render();
}
function showTab(v){state.view=v;catFilter=null;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));render();}
async function render(){
  await loadWeekData(dateStr(state.weekStart));
  if(state.view==='dashboard'){
    if(!state.currentWeek&&isCurrentWeek(dateStr(state.weekStart))) await computePendingRollover();
    renderDashboard();
  }
  else if(state.view==='history')renderHistoryList();
  else if(state.view==='history-detail')renderHistoryDetail();
  else if(state.view==='settings')renderSettings();
}
function renderDashboard(){
  const wStr=dateStr(state.weekStart);const isCur=isCurrentWeek(wStr);const s=state.summary;
  const pot=s?+s.total_pot:0;const spent=s?+s.total_spent:0;const rem=s?+s.remaining:0;
  const pct=pot>0?Math.min(spent/pot*100,100):0;const isOver=rem<0;const weekExists=!!state.currentWeek;
  $('app').innerHTML=`<nav class="nav"><div class="brand">Envelope<span>.</span><span class="ver">v${APP_VERSION}</span></div><div class="tabs"><button class="tab active" data-v="dashboard" onclick="showTab('dashboard')">This Week</button><button class="tab" data-v="history" onclick="showTab('history')">History</button></div><div style="display:flex;gap:6px"><button class="btn-icon" onclick="forceRefresh()">↻</button><button class="btn-icon" onclick="showTab('settings')">⚙</button></div></nav>
  <div class="hero"><div class="hero-left"><div class="week-label">Week of</div><div class="week-range">${fmtRange(wStr)}</div><div class="week-nav"><button onclick="prevWeek()">←</button>${isCur?'<span class="now-badge">NOW</span>':''}<button onclick="nextWeek()" ${isCur?'disabled':''}>→</button></div></div>${weekExists?`<div class="hero-stats"><div class="hstat-hero"><div class="hstat-label">Left</div><div class="hstat-hero-val ${isOver?'neg':'pos'}">${fmt(rem)}</div><div class="hstat-spent-line"><span class="hstat-spent-label">Spent</span> <span class="hstat-spent-val neu">${fmt(spent)}</span></div></div></div>`:''}</div>
  ${weekExists?`<div class="pot-bar-wrap"><div class="pot-bar-row"><span class="pot-bar-label">$0</span><div class="pot-bar-outer"><div class="pot-bar-pct ${isOver?'over':''}" style="left:${Math.min(Math.max(pct,6),98)}%">${pct.toFixed(1)}%</div><div class="pot-bar"><div class="pot-bar-fill ${isOver?'over':''}" style="width:${pct}%"></div></div></div><span class="pot-bar-label ${isOver?'neg':'neu'}">${fmt(pot)}${s&&+s.rollover>0?'*':''}</span></div>${s&&+s.rollover>0?`<div style="font-size:.74rem;color:var(--amber);margin-top:10px;">* includes ${fmt(+s.rollover)} rollover from last week</div>`:''}</div>`:'' }
  ${!weekExists&&isCur?`<div class="init-banner"><div><div class="init-banner-text">📅 Set up Week of ${fmtRange(wStr)}</div><div style="font-size:.78rem;color:var(--muted);margin-top:3px;">${fmt(parseFloat(state.settings.weekly_budget)||600)} budget${pendingRollover>0?` · +${fmt(pendingRollover)} rollover from last week`:''}</div></div><div style="display:flex;gap:12px;align-items:center;flex-shrink:0;"><button class="btn-amber" onclick="oneTapStartWeek()">Start Week</button><span style="font-size:.78rem;color:var(--muted);text-decoration:underline;cursor:pointer;white-space:nowrap;" onclick="openInitWeek()">Customize</span></div></div>`:''}
  ${!weekExists&&!isCur?`<div class="init-banner"><div class="init-banner-text">No data for this week.</div></div>`:''}
  <div class="cat-grid" id="catGrid"></div>
  ${weekExists?`<div class="add-row"><button class="btn-add" onclick="openAddTxn()">+ Log Spending</button></div><div class="txn-section"><div class="section-label">Transactions</div><div class="txn-card"><div id="txnList"></div></div></div>`:''}`;
  if(weekExists){renderCatCards(state.catSpending,pot);renderTxnList(state.transactions,'txnList');}
}
function renderCatCards(catSpending,pot){
  const grid=$('catGrid');if(!grid)return;
  const rows=catSpending.length===0
    ?state.categories.map(c=>({...c,spent:0}))
    :catSpending.map(cs=>({...(state.categoriesById[cs.category_id]||{}),spent:+cs.spent})).filter(c=>c.spent>0);
  if(rows.length===0){grid.innerHTML='';return;}
  grid.innerHTML=rows.map(c=>{const pct=pot>0?(c.spent/pot*100):0;const active=c.id===catFilter;return `<div class="cat-card ${active?'active':''}" onclick="toggleCatFilter('${c.id}')"><div class="cat-fill" style="height:${Math.min(pct*2,80)}%;background:${c.color}"></div><div style="position:relative"><div class="cat-top"><span class="cat-icon">${c.icon}</span><span class="cat-name">${esc(c.name)}</span></div><div class="cat-spent" style="color:${c.color}">${fmt(c.spent)}</div><div class="cat-pct">${pct.toFixed(1)}% of pot</div><div class="cat-bar"><div class="cat-bar-fill" style="width:${Math.min(pct*2,100)}%;background:${c.color}"></div></div></div></div>`;}).join('');
}
function toggleCatFilter(id){
  catFilter=(catFilter===id)?null:id;
  if(state.view==='history-detail'){renderCatCards(state.historyDetailCats,state.historyDetailSummary?+state.historyDetailSummary.total_pot:0);renderTxnList(state.historyDetailTxns,'hdTxnList');}
  else{renderCatCards(state.catSpending,state.summary?+state.summary.total_pot:0);renderTxnList(state.transactions,'txnList');}
}
function renderTxnList(txns,containerId){
  const el=$(containerId);if(!el)return;
  txns=(txns||[]).filter(t=>!pendingTxnGroups.has(t.group_id));
  if(catFilter){
    const matchingGroups=new Set(txns.filter(t=>t.category_id===catFilter).map(t=>t.group_id));
    txns=txns.filter(t=>matchingGroups.has(t.group_id));
  }
  if(txns.length===0){el.innerHTML=`<div class="empty-txn">${catFilter?'No transactions in this category.':'No spending logged yet.'}</div>`;return;}
  const groups={};txns.forEach(t=>{if(!groups[t.group_id])groups[t.group_id]=[];groups[t.group_id].push(t);});
  const orderedGroups=Object.values(groups).sort((a,b)=>new Date(b[0].created_at)-new Date(a[0].created_at));
  el.innerHTML=orderedGroups.map(group=>{
    const isSplit=group.length>1;const total=group.reduce((s,t)=>s+(+t.amount),0);const first=group[0];const cat=first.categories;
    const dateLabel=fmtDateShort(first.txn_date);
    if(!isSplit){return `<div class="txn-group"><div class="txn-row"><div class="txn-dot" style="background:${cat?.color||'var(--muted)'}"></div><div class="txn-main"><div class="txn-vendor">${esc(first.vendor||cat?.name||'—')}</div><div class="txn-meta">${cat?.icon||''} ${esc(cat?.name||'')}</div></div><div class="txn-right"><div class="txn-amount">-${fmt(+first.amount)}</div><div class="txn-date">${dateLabel}</div></div><button class="txn-edit" onclick="openEditTxn('${first.group_id}')">Edit</button><button class="txn-del" onclick="deleteGroup('${first.group_id}')">✕</button></div></div>`;}
    const splitLines=group.map(t=>`<div class="split-line"><div class="txn-dot" style="background:${t.categories?.color||'var(--muted)'}"></div><div class="txn-cat-name">${t.categories?.icon||''} ${esc(t.categories?.name||'')}</div><div class="txn-amount">-${fmt(+t.amount)}</div></div>`).join('');
    return `<div class="txn-group"><div class="txn-row"><div class="txn-dot" style="background:var(--muted)"></div><div class="txn-main"><div class="txn-vendor">${esc(first.vendor||'Split transaction')}<span class="txn-split-badge">split</span></div>${first.description?`<div class="txn-meta">${esc(first.description)}</div>`:''}</div><div class="txn-right"><div class="txn-amount">-${fmt(total)}</div><div class="txn-date">${dateLabel}</div></div><button class="txn-edit" onclick="openEditTxn('${first.group_id}')">Edit</button><button class="txn-del" onclick="deleteGroup('${first.group_id}')">✕</button></div>${splitLines}</div>`;
  }).join('');
}
function prevWeek(){catFilter=null;const d=new Date(state.weekStart);d.setDate(d.getDate()-7);state.weekStart=d;render();}
function nextWeek(){const today=saturday();const d=new Date(state.weekStart);d.setDate(d.getDate()+7);if(d>today)return;catFilter=null;state.weekStart=d;render();}
let pendingRollover=0,applyRollover=true;
async function computePendingRollover(){
  const prevSat=new Date(state.weekStart);prevSat.setDate(prevSat.getDate()-7);
  const {data:prevSum}=await sb.from('week_summary').select('*').eq('start_date',dateStr(prevSat)).single();
  pendingRollover=(prevSum&&+prevSum.remaining>0)?+prevSum.remaining:0;
  applyRollover=true;
}
async function openInitWeek(){
  const wStr=dateStr(state.weekStart);$('initTitle').textContent='Set Up '+fmtRange(wStr);
  $('initBudget').value=state.settings.weekly_budget||'600';
  await computePendingRollover();
  renderRolloverBlock();
  openOverlay('initOverlay');
}
async function oneTapStartWeek(){
  const budget=parseFloat(state.settings.weekly_budget)||600;
  const applyRo=pendingRollover>0;
  const {error}=await sb.rpc('initialize_week',{p_start_date:dateStr(state.weekStart),p_base_budget:budget,p_apply_rollover:applyRo});
  if(error){showToast('Error: '+error.message);return;}
  showToast('Week ready 🎉');await loadMeta();render();
}
function renderRolloverBlock(){
  const block=$('initRolloverBlock');
  if(pendingRollover<=0){block.style.display='none';return;}
  block.style.display='block';
  $('initRolloverNote').textContent=`↩ ${fmt(pendingRollover)} left over from last week. Roll it into this week's pot?`;
  $('rolloverYesBtn').textContent=`Yes, add ${fmt(pendingRollover)}`;
  $('rolloverYesBtn').classList.toggle('active',applyRollover);
  $('rolloverNoBtn').classList.toggle('active',!applyRollover);
}
function setRolloverChoice(val){applyRollover=val;renderRolloverBlock();}
async function submitInitWeek(){
  const budget=parseFloat($('initBudget').value);if(!budget||budget<=0){showToast('Enter a budget');return;}
  const btn=document.querySelector('#initOverlay .btn-primary');btn.disabled=true;btn.textContent='Setting up…';
  await sb.from('settings').upsert({key:'weekly_budget',value:String(budget),user_id:session.user.id});
  const {error}=await sb.rpc('initialize_week',{p_start_date:dateStr(state.weekStart),p_base_budget:budget,p_apply_rollover:pendingRollover>0?applyRollover:false});
  btn.disabled=false;btn.textContent='Start the Week';
  if(error){showToast('Error: '+error.message);return;}
  closeOverlay('initOverlay');showToast('Week ready 🎉');await loadMeta();render();
}
let splitRows=[];
let editingGroupId=null,editingWeekId=null;
function openAddTxn(){
  if(!state.currentWeek)return;
  editingGroupId=null;editingWeekId=null;$('txnModalTitle').textContent='Log Spending';
  $('txnVendor').value='';$('txnDesc').value='';
  const todayStr=dateStr(new Date());$('txnDate').value=todayStr;showDateCollapsed(todayStr);
  splitRows=[{category_id:state.categories[0]?.id||'',amount:''}];renderSplitRows();updateSplitHint();
  renderVendorChips();
  openOverlay('txnOverlay');
  if(matchMedia('(hover:hover)').matches) setTimeout(()=>$('txnVendor').focus(),120);
}
function openEditTxn(groupId){
  const list=state.view==='history-detail'?state.historyDetailTxns:state.transactions;
  const rows=list.filter(t=>t.group_id===groupId);
  if(!rows.length)return;
  editingGroupId=groupId;editingWeekId=rows[0].week_id;
  $('txnModalTitle').textContent='Edit Transaction';
  $('txnVendor').value=rows[0].vendor||'';
  $('txnDesc').value=rows[0].description||'';
  $('txnDate').value=rows[0].txn_date;
  if(rows[0].txn_date===dateStr(new Date()))showDateCollapsed(rows[0].txn_date);else expandDate(false);
  splitRows=rows.map(r=>({category_id:r.category_id,amount:String(r.amount)}));
  renderSplitRows();updateSplitHint();
  renderVendorChips();
  openOverlay('txnOverlay');
}
function showDateCollapsed(dstr){$('dateCollapsedText').textContent=fmtDateShort(dstr);$('dateCollapsed').style.display='block';$('txnDate').style.display='none';}
function expandDate(autoOpen=true){$('dateCollapsed').style.display='none';$('txnDate').style.display='block';if(autoOpen){$('txnDate').focus();if(typeof $('txnDate').showPicker==='function'){try{$('txnDate').showPicker();}catch(e){}}}}
function renderVendorChips(){
  const el=$('vendorChips');if(!el)return;
  const chips=(state.topVendors||[]).slice(0,5);
  if(!chips.length){el.style.display='none';el.innerHTML='';return;}
  el.style.display='flex';
  el.innerHTML=chips.map((v,i)=>`<button type="button" class="vchip" onmousedown="event.preventDefault()" onclick="pickVendorChip(${i})">${esc(toInitCap(v))}</button>`).join('');
}
function pickVendorChip(i){const v=(state.topVendors||[])[i];if(v==null)return;selectVendor(v);}
function renderSplitRows(){
  $('splitRows').innerHTML=splitRows.map((r,i)=>`<div class="split-row"><div class="field"><label>Category</label><select onchange="splitRows[${i}].category_id=this.value">${state.categories.map(c=>`<option value="${c.id}" ${c.id===r.category_id?'selected':''}>${c.icon} ${esc(c.name)}</option>`).join('')}</select></div><div class="field"><label>Amount ($)</label><input type="number" inputmode="decimal" value="${r.amount}" placeholder="0.00" step="0.01" min="0.01" oninput="splitRows[${i}].amount=this.value;updateSplitHint()"></div>${splitRows.length>1?`<button class="split-remove" onclick="removeSplitRow(${i})">✕</button>`:''}</div>`).join('');
}
function addSplitRow(){splitRows.push({category_id:state.categories[0]?.id||'',amount:''});renderSplitRows();updateSplitHint();}
function removeSplitRow(i){splitRows.splice(i,1);renderSplitRows();updateSplitHint();}
function updateSplitHint(){const hint=$('splitHint');if(splitRows.length<2){hint.textContent='';return;}const total=splitRows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);hint.textContent=`Split total: ${fmt(total)}`;hint.className='split-total-hint';}
async function submitTransaction(){
  const vendor=toInitCap($('txnVendor').value.trim());const desc=$('txnDesc').value.trim();const date=$('txnDate').value;
  const rows=splitRows.map(r=>({category_id:r.category_id,amount:parseFloat(r.amount)||0})).filter(r=>r.amount>0);
  if(!rows.length){showToast('Enter an amount');return;}if(!vendor){showToast('Enter a vendor');return;}
  const btn=$('txnSubmitBtn');btn.disabled=true;btn.textContent='Saving…';
  const vkey=vendor.toLowerCase().trim();
  if(editingGroupId){
    const oldGroupId=editingGroupId,weekId=editingWeekId;
    const newGroupId=crypto.randomUUID();
    const inserts=rows.map(r=>({week_id:weekId,category_id:r.category_id,group_id:newGroupId,vendor:vendor||null,description:desc||null,amount:r.amount,txn_date:date,user_id:session.user.id}));
    const {error:insErr}=await sb.from('transactions').insert(inserts);
    if(insErr){showToast('Error: '+insErr.message);btn.disabled=false;btn.textContent='Save';return;}
    const {error:delErr}=await sb.from('transactions').delete().eq('group_id',oldGroupId);
    if(delErr)showToast("Saved, but couldn't remove the old version — please delete the duplicate manually");
    await sb.from('vendor_category_map').upsert({vendor_key:vkey,category_id:rows[0].category_id,user_id:session.user.id,updated_at:new Date().toISOString()});
    if(!state.vendorMap[vkey]){state.vendorNames.push(vkey);state.vendorNames.sort();}
    state.vendorMap[vkey]=rows[0].category_id;
    editingGroupId=null;editingWeekId=null;
    await computeTopVendors();
    btn.disabled=false;btn.textContent='Save';closeOverlay('txnOverlay');
    if(!delErr)showToast('Updated ✓');
    if(state.view==='history-detail')openHistoryDetail(state.historyDetailWeek);else render();
    return;
  }
  const groupId=crypto.randomUUID();
  const inserts=rows.map(r=>({week_id:state.currentWeek.id,category_id:r.category_id,group_id:groupId,vendor:vendor||null,description:desc||null,amount:r.amount,txn_date:date,user_id:session.user.id}));
  const {error}=await sb.from('transactions').insert(inserts);
  if(error){showToast('Error: '+error.message);btn.disabled=false;btn.textContent='Save';return;}
  await sb.from('vendor_category_map').upsert({vendor_key:vkey,category_id:rows[0].category_id,user_id:session.user.id,updated_at:new Date().toISOString()});
  if(!state.vendorMap[vkey]){state.vendorNames.push(vkey);state.vendorNames.sort();}
  state.vendorMap[vkey]=rows[0].category_id;
  await computeTopVendors();
  btn.disabled=false;btn.textContent='Save';closeOverlay('txnOverlay');showToast('Logged ✓');render();
}
const pendingTxnGroups=new Set();
let pendingTxnTimer=null;
function rerenderTxns(){
  if(state.view==='history-detail') renderTxnList(state.historyDetailTxns,'hdTxnList');
  else renderTxnList(state.transactions,'txnList');
}
function deleteGroup(groupId){
  pendingTxnGroups.add(groupId);
  rerenderTxns();
  clearTimeout(pendingTxnTimer);
  showToast('Transaction removed',()=>{
    clearTimeout(pendingTxnTimer);
    pendingTxnGroups.clear();
    rerenderTxns();
  });
  pendingTxnTimer=setTimeout(commitPendingTxnDeletes,5000);
}
async function commitPendingTxnDeletes(){
  const ids=[...pendingTxnGroups];
  if(!ids.length) return;
  const {error}=await sb.from('transactions').delete().in('group_id',ids);
  pendingTxnGroups.clear();
  if(error){showToast('Error deleting — restored');rerenderTxns();return;}
  if(state.view==='history-detail') openHistoryDetail(state.historyDetailWeek);
  else render();
}
let acHideTimer=null;
let acMatches=[];
function onVendorInput(val){const list=$('acList');if(!val){list.style.display='none';return;}const q=val.toLowerCase();acMatches=state.vendorNames.filter(v=>v.includes(q)).slice(0,6);if(!acMatches.length){list.style.display='none';return;}list.innerHTML=acMatches.map((v,i)=>`<div class="autocomplete-item" onmousedown="selectVendorIdx(${i})">${esc(toInitCap(v))}</div>`).join('');list.style.display='block';}
function selectVendorIdx(i){if(acMatches[i]!=null)selectVendor(acMatches[i]);}
function hideAC(){acHideTimer=setTimeout(()=>{$('acList').style.display='none';},150);}
function selectVendor(vkey){clearTimeout(acHideTimer);$('txnVendor').value=toInitCap(vkey);$('acList').style.display='none';const catId=state.vendorMap[vkey];if(catId&&splitRows.length===1){splitRows[0].category_id=catId;renderSplitRows();}if(!matchMedia('(hover:hover)').matches){const amtInput=document.querySelector('#splitRows .split-row input[type="number"]');if(amtInput)amtInput.focus();}}
async function renderHistoryList(){
  $('app').innerHTML=`<nav class="nav"><div class="brand">Envelope<span>.</span><span class="ver">v${APP_VERSION}</span></div><div class="tabs"><button class="tab" data-v="dashboard" onclick="showTab('dashboard')">This Week</button><button class="tab active" data-v="history" onclick="showTab('history')">History</button></div><div style="display:flex;gap:6px"><button class="btn-icon" onclick="forceRefresh()">↻</button><button class="btn-icon" onclick="showTab('settings')">⚙</button></div></nav><div class="history-view"><div class="section-label" style="margin-bottom:14px">All Weeks</div><div id="hwList"><div style="color:var(--muted);font-size:.84rem">Loading…</div></div></div>`;
  const {data:sums}=await sb.from('week_summary').select('*').order('start_date',{ascending:false});
  const list=$('hwList');if(!sums||!sums.length){list.innerHTML='<div style="color:var(--muted);font-size:.84rem">No weeks yet.</div>';return;}
  list.innerHTML=sums.map(s=>{const rem=+s.remaining;return `<div class="hw-card" onclick="openHistoryDetail('${s.start_date}')"><div><div class="hw-range">${fmtRange(s.start_date)}${isCurrentWeek(s.start_date)?' <span style="color:var(--teal-text);font-size:.72rem">NOW</span>':''}</div><div class="hw-sub">${fmt(+s.total_spent)} spent of ${fmt(+s.total_pot)}</div></div><div><div class="hw-stat-val ${rem<0?'neg':'pos'}">${fmt(rem)}</div><div class="hw-stat-sub">${rem<0?'over':'left'}</div></div></div>`;}).join('');
}
async function openHistoryDetail(startDate){
  if(state.historyDetailWeek!==startDate)catFilter=null;
  state.view='history-detail';state.historyDetailWeek=startDate;
  const wRow=state.weeks.find(w=>w.start_date===startDate);let txns=[],cats=[],summ=null;
  if(wRow){const[{data:t},{data:c},{data:sv}]=await Promise.all([sb.from('transactions').select('*,categories(name,icon,color)').eq('week_id',wRow.id).order('created_at',{ascending:false}),sb.from('category_spending').select('*').eq('week_id',wRow.id).order('sort_order'),sb.from('week_summary').select('*').eq('id',wRow.id).single()]);txns=t||[];cats=c||[];summ=sv||null;}
  state.historyDetailTxns=txns;state.historyDetailCats=cats;state.historyDetailSummary=summ;renderHistoryDetail();
}
function renderHistoryDetail(){
  const sd=state.historyDetailWeek;const s=state.historyDetailSummary;
  const pot=s?+s.total_pot:0;const spent=s?+s.total_spent:0;const rem=s?+s.remaining:0;
  $('app').innerHTML=`<nav class="nav"><div class="brand">Envelope<span>.</span><span class="ver">v${APP_VERSION}</span></div><div class="tabs"><button class="tab" data-v="dashboard" onclick="showTab('dashboard')">This Week</button><button class="tab active" data-v="history" onclick="showTab('history')">History</button></div><div style="display:flex;gap:6px"><button class="btn-icon" onclick="forceRefresh()">↻</button><button class="btn-icon" onclick="showTab('settings')">⚙</button></div></nav>
  <div style="padding:20px;max-width:700px;margin:0 auto"><button class="back-btn" onclick="showTab('history')">← All Weeks</button><div class="week-label">Week of</div><div class="week-range" style="font-family:var(--fg);font-size:1.3rem;font-weight:700;letter-spacing:-.04em;margin-bottom:16px">${fmtRange(sd)}</div>
  ${s?`<div style="display:flex;gap:20px;margin-bottom:18px;flex-wrap:wrap"><div class="hstat"><div class="hstat-label">Pot</div><div class="hstat-val neu">${fmt(pot)}</div></div><div class="hstat"><div class="hstat-label">Spent</div><div class="hstat-val neu">${fmt(spent)}</div></div><div class="hstat"><div class="hstat-label">${rem<0?'Over':'Left'}</div><div class="hstat-val ${rem<0?'neg':'pos'}">${fmt(Math.abs(rem))}</div></div>${+s.rollover>0?`<div class="hstat"><div class="hstat-label">Rollover in</div><div class="hstat-val" style="color:var(--amber)">${fmt(+s.rollover)}</div></div>`:''}</div><div class="pot-bar-wrap" style="margin:0 0 20px"><div class="pot-bar-row"><span class="pot-bar-label">$0</span><div class="pot-bar-outer"><div class="pot-bar-pct ${rem<0?'over':''}" style="left:${pot>0?Math.min(Math.max(spent/pot*100,6),98):6}%">${pot>0?(spent/pot*100).toFixed(1):'0.0'}%</div><div class="pot-bar"><div class="pot-bar-fill ${rem<0?'over':''}" style="width:${pot>0?Math.min(spent/pot*100,100):0}%"></div></div></div><span class="pot-bar-label ${rem<0?'neg':'neu'}">${fmt(pot)}</span></div></div>`:''}
  <div class="section-label" style="margin-bottom:10px">By Category</div><div class="cat-grid" id="catGrid" style="padding:0;margin-bottom:24px"></div>
  <div class="section-label" style="margin-bottom:10px">Transactions</div><div class="txn-card"><div id="hdTxnList"></div></div></div>`;
  renderCatCards(state.historyDetailCats,pot);renderTxnList(state.historyDetailTxns,'hdTxnList');
}
function renderSettings(){
  const defBudget=state.settings.weekly_budget||'600';
  $('app').innerHTML=`<nav class="nav"><div class="brand">Envelope<span>.</span><span class="ver">v${APP_VERSION}</span></div><div class="tabs"><button class="tab" data-v="dashboard" onclick="showTab('dashboard')">This Week</button><button class="tab" data-v="history" onclick="showTab('history')">History</button></div><button class="btn-icon" onclick="showTab('settings')" style="background:var(--teal);color:var(--action-text)">⚙</button></nav>
  <div class="settings-view">
    <div class="settings-section"><div class="settings-title">Default Weekly Budget</div><div class="field"><label>Amount ($)</label><input type="number" id="defBudgetInput" value="${defBudget}" step="1" min="1"></div><button class="btn-primary" onclick="saveDefBudget()">Save Default</button></div>
    <div class="settings-section"><div class="settings-title">Categories</div>${state.categories.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px"><span>${c.icon}</span><span style="flex:1;font-size:.88rem">${esc(c.name)}</span><span style="width:14px;height:14px;border-radius:50%;background:${c.color};display:inline-block;flex-shrink:0"></span><button onclick="archiveCategory('${c.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;flex-shrink:0">archive</button></div>`).join('')}
    <div style="margin-top:14px"><div class="settings-title">Add Category</div><div class="frow"><div class="field"><label>Name</label><input type="text" id="newCatName" placeholder="Entertainment"></div><div class="field" style="flex:0 0 70px"><label>Icon</label><input type="text" id="newCatIcon" placeholder="🎮" maxlength="2"></div><div class="field" style="flex:0 0 60px"><label>Color</label><input type="color" id="newCatColor" value="#A8E63D" style="height:42px;padding:3px"></div></div><button class="btn-primary" onclick="addCategory()">Add</button></div></div>
    <div class="settings-section"><div class="settings-title">Vendor Memory</div><div style="font-size:.8rem;color:var(--muted);margin-bottom:10px">${state.vendorNames.length} vendor${state.vendorNames.length!==1?'s':''} learned.</div>${state.vendorNames.slice(0,10).map((v,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><span style="flex:1;font-size:.82rem">${esc(v)}</span><span style="font-size:.78rem;color:var(--muted)">${esc(state.categories.find(c=>c.id===state.vendorMap[v])?.name||'')}</span><button onclick="forgetVendorIdx(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem">forget</button></div>`).join('')}</div>
    <div class="settings-section"><div class="settings-title">Account</div><button class="btn-primary" style="background:var(--elevated);color:var(--text);border:1px solid var(--border)" onclick="doSignOut()">Sign Out</button></div>
  </div>`;
}
async function saveDefBudget(){const v=$('defBudgetInput').value.trim();if(!v||isNaN(v)){showToast('Enter a valid amount');return;}await sb.from('settings').upsert({key:'weekly_budget',value:v,user_id:session.user.id});state.settings.weekly_budget=v;showToast('Default budget saved ✓');}
async function addCategory(){const name=$('newCatName').value.trim();const icon=$('newCatIcon').value.trim()||'💰';const color=$('newCatColor').value;if(!name){showToast('Enter a name');return;}const maxSort=Math.max(0,...state.categories.map(c=>c.sort_order));const {error}=await sb.from('categories').insert({name,icon,color,sort_order:maxSort+1,user_id:session.user.id});if(error){showToast('Error: '+error.message);return;}showToast('Category added');await loadMeta();renderSettings();}
async function archiveCategory(id){
  const cat=state.categories.find(c=>c.id===id);if(!cat)return;
  if(!confirm(`Archive "${cat.name}"? It'll be hidden from new transactions, but past spending stays intact in History.`))return;
  const {error}=await sb.from('categories').update({is_active:false}).eq('id',id);
  if(error){showToast('Error: '+error.message);return;}
  if(catFilter===id)catFilter=null;
  showToast('Category archived');
  await loadMeta();renderSettings();
}
function forgetVendorIdx(i){const v=state.vendorNames[i];if(v!=null)forgetVendor(v);}
async function forgetVendor(vkey){await sb.from('vendor_category_map').delete().eq('vendor_key',vkey);delete state.vendorMap[vkey];state.vendorNames=state.vendorNames.filter(v=>v!==vkey);showToast('Forgotten');renderSettings();}
async function doSignOut(){await sb.auth.signOut();session=null;renderLogin();}
boot();
</script>
</body>
</html>
